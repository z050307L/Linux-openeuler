<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux-openEuler 文档目录</title>
  <!-- Markdown解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 代码高亮【更换完整包】 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, "Microsoft YaHei", sans-serif;
    }
    .sidebar {
      width: 260px;
      background: #2c3e50;
      color: #fff;
      padding: 20px 0;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      padding: 0 10px;
    }
    .chapter-item {
      padding: 12px 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chapter-item:hover {
      background: #34495e;
    }
    .chapter-item.active {
      background: #3498db;
    }
    .content-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 30px 50px;
      background: #fff;
    }
    #markdown-content {
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.7;
    }
    #markdown-content h1,h2,h3,h4 {
      margin: 1.2em 0 0.6em;
    }
    #markdown-content p {
      margin: 0.8em 0;
    }
    #markdown-content pre {
      border-radius: 6px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #markdown-content code {
      font-family: "Consolas", monospace;
    }
    #markdown-content blockquote {
      border-left: 4px solid #999;
      padding-left: 14px;
      color: #555;
      margin: 1em 0;
    }
    #markdown-content ul,ol {
      padding-left: 2em;
      margin: 0.8em 0;
    }
    .tip-empty {
      color: #888;
      text-align: center;
      margin-top: 100px;
      font-size: 16px;
    }
    .loading {
      color:#666;
      text-align:center;
      margin-top:100px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>📚 openEuler 章节目录</h2>
    <div id="menu-list"></div>
  </div>
  <div class="content-wrap">
    <div id="markdown-content">
      <div class="tip-empty">请点击左侧章节查看文档</div>
    </div>
  </div>

  <script>
    // 章节列表 chapter01 ~ chapter15
    const chapters = [];
    for(let i = 1; i <= 15; i++){
      const num = String(i).padStart(2, '0');
      chapters.push(`chapter${num}`);
    }

    const menuList = document.getElementById('menu-list');
    const contentBox = document.getElementById('markdown-content');

    // 读取URL hash，支持刷新保留章节
    function getCurrentChapter(){
      const hash = window.location.hash.replace('#','');
      return chapters.includes(hash) ? hash : null;
    }

    async function loadChapter(name){
      document.querySelectorAll('.chapter-item').forEach(el=>el.classList.remove('active'));
      const activeItem = document.querySelector(`[data-chapter="${name}"]`);
      if(activeItem) activeItem.classList.add('active');

      window.location.hash = name;
      contentBox.innerHTML = `<div class="loading">加载中 ${name}/${name}.md ...</div>`;
      const mdPath = `${name}/${name}.md`;
      try{
        const res = await fetch(mdPath);
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const mdText = await res.text();
        let html = marked.parse(mdText);

        // 修复图片相对路径
        const baseDir = `${name}/`;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        const imgs = tempDiv.querySelectorAll('img');
        imgs.forEach(img=>{
          const src = img.getAttribute('src');
          if(!src || src.startsWith('http://') || src.startsWith('https://') || src.startsWith('/')){
            return;
          }
          img.src = baseDir + src;
        });
        html = tempDiv.innerHTML;

        contentBox.innerHTML = html;

        // 增加判断：hljs存在才执行高亮，防止报错阻断渲染
        if(window.hljs){
          document.querySelectorAll('pre code').forEach(block=>{
            hljs.highlightElement(block);
          });
        }

      }catch(err){
        console.error("加载异常：", err);
        contentBox.innerHTML = `
        <div style="color:red;">
          ❌ 加载失败<br>
          请求路径：${mdPath}<br>
          错误信息：${err.message}<br>
          <small>提示：如果是hljs报错，属于脚本加载时序问题，刷新页面重试即可</small>
        </div>`;
      }
    }

    // 渲染菜单
    chapters.forEach(name => {
      const div = document.createElement('div');
      div.className = 'chapter-item';
      div.textContent = name;
      div.dataset.chapter = name;
      div.onclick = ()=> loadChapter(name);
      menuList.appendChild(div);
    })

    marked.setOptions({
      gfm: true,
      breaks: true
    })

    window.addEventListener('hashchange', ()=>{
      const ch = getCurrentChapter();
      if(ch) loadChapter(ch);
    })
    window.addEventListener('load', ()=>{
      const ch = getCurrentChapter();
      if(ch) loadChapter(ch);
    })
  </script>
</body>
</html>
